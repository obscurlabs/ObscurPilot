name: ObscurPilot quality gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install exact dependency graph
        run: npm ci

      - name: Start clean local Supabase stack
        run: npx supabase start

      - name: Verify upgrade from the pre-Stage-6 baseline
        run: |
          npx supabase db reset --local --version 202607150000
          npx supabase migration up --local

      - name: Run pgTAP after upgrade migration
        run: npx supabase test db

      - name: Verify clean migration replay
        run: npx supabase db reset --local

      - name: Run pgTAP after clean migration
        run: npx supabase test db

      - name: Stop local Supabase stack
        if: always()
        run: npx supabase stop --no-backup

  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install exact dependency graph
        run: npm ci

      - name: Static verification
        run: npm run verify:static

      - name: Production build
        run: npm run build

      - name: Combined startup security check
        run: npm run check

      - name: Create unsigned unpacked artifact
        run: npm run package:dir

      - name: Upload unpacked desktop
        uses: actions/upload-artifact@v4
        with:
          name: obscurpilot-windows-unpacked
          path: artifacts/win-unpacked
          if-no-files-found: error
          retention-days: 7
